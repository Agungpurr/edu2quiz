name: eduquiz_app
description: Aplikasi Quiz Duolingo-style untuk SD Kelas 4, 5, 6
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.9.0
  pdf: ^3.10.7
  printing: ^5.12.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.4.1
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/quiz_music.mp3
